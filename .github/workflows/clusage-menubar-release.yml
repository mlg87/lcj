# clusage-menubar CI + automated releases.
#
# HOW A RELEASE HAPPENS (humans & agents — see also AGENTS.md "Releasing"):
#   1. PRs merge to main with conventional-commit messages (feat:/fix:/…)
#      touching clusage-menubar/**. No manual version bumps.
#   2. release-please maintains a rolling release PR that accumulates those
#      commits, bumping clusage-menubar/version.txt + CHANGELOG.md.
#   3. Merging that release PR: release-please creates the tag
#      clusage-menubar-v<version> + a DRAFT GitHub release, then build-dmg
#      builds the ad-hoc-signed DMG + tar.gz (no Apple Developer Program,
#      no signing secrets), uploads them, and publishes.
# NEVER create clusage-menubar-v* tags or releases manually — CI owns them.
name: clusage-menubar release

on:
  push:
    branches: [main]
    paths:
      - 'clusage-menubar/**'
      - '.github/workflows/clusage-menubar-release.yml'
      - 'release-please-config.json'
      - '.release-please-manifest.json'

permissions:
  contents: write        # tags + releases
  pull-requests: write   # release-please's release PR

concurrency:
  group: clusage-menubar-release
  cancel-in-progress: false   # queue racing merges; never abort a half-published release

jobs:
  check:
    # macos-15: default Xcode 16.x = Swift 6 toolchain (Package.swift needs
    # swift-tools-version 6.0). macos-14's default Xcode 15.x is Swift 5.10 — too old.
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: clusage-menubar
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          sw_vers
          swift --version
          # The linter ships in Ubuntu images but is not guaranteed on macOS runners
          command -v shellcheck >/dev/null || brew install shellcheck

      - name: Check (build + tests + shellcheck)
        run: make check

  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs['clusage-menubar--release_created'] }}
      tag_name: ${{ steps.rp.outputs['clusage-menubar--tag_name'] }}
      version: ${{ steps.rp.outputs['clusage-menubar--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  build-dmg:
    needs: [check, release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: clusage-menubar
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build universal app bundle
        run: ./build.sh

      - name: Create DMG (ad-hoc)
        env:
          SKIP_DMG_LAYOUT: "1"   # no Finder session on headless runners
        run: ./create_dmg.sh

      - name: Create tarball (consumed by install.sh — curl/tar carries no quarantine xattr)
        run: tar -czf "ClusageMenubar-${{ needs.release-please.outputs.version }}.tar.gz" -C build ClusageMenubar.app

      - name: Upload artifacts and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "ClusageMenubar-${{ needs.release-please.outputs.version }}.dmg" \
            "ClusageMenubar-${{ needs.release-please.outputs.version }}.tar.gz"
          gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false

