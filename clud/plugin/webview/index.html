<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Claude HUD</title>
  <link rel="stylesheet" href="hud.css">
</head>
<body>
  <!--
    The HUD renders one card per live Claude session (tty-map entry) and
    highlights the focused one. Cards are cloned from <template id="session-card">
    so the JS stays small and the markup stays declarative.
  -->
  <main id="hud" class="hud" data-state="empty">
    <section class="empty">
      <p>No Claude sessions running.</p>
    </section>

    <section class="sessions">
      <div id="sessions" class="sessions-list"></div>
      <footer class="footer">
        <span id="last-updated" class="last-updated">—</span>
      </footer>
    </section>
  </main>

  <template id="session-card">
    <article class="card" data-focused="0">
      <!--
        Header is three tokens, separated by · (added in CSS via ::before):
          .label = project basename — always the primary context anchor.
          .name  = session name from `claude -n` / `/rename`, when set.
          .model = model name, when the SessionStart hook supplies it.
        The data-has-name / data-has-model attributes hide the .name and
        .model spans (and their separators) when their fields are empty —
        a missing model must never render as a bare "?". When project is
        unknown (rare) the JS promotes name or "(unnamed)" into .label so
        the header still tells the user something.
      -->
      <header class="header" data-has-name="0" data-has-model="0">
        <span class="label">—</span>
        <span class="name"></span>
        <span class="model"></span>
      </header>
      <div class="current hidden">
        <span class="indicator">▶</span>
        <span class="tool"></span>
        <span class="summary"></span>
        <span class="elapsed"></span>
      </div>
      <div class="subagents-wrap hidden">
        <div class="section-header">
          <span class="label">Sub-agents</span>
          <span class="subagents-count count">0</span>
        </div>
        <ul class="subagents"></ul>
      </div>
      <div class="todos-wrap">
        <div class="section-header">
          <span class="label">Todos</span>
          <span class="todos-count count">0/0</span>
        </div>
        <div class="progress"><div class="bar"></div></div>
        <ul class="todos"></ul>
      </div>
    </article>
  </template>

  <script src="hud.js"></script>
</body>
</html>
